name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: PHP Syntax Check
        run: |
          find backend -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Run Critical Path Tests
        run: php backend/tests/run.php

