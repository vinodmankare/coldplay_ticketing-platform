<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coldplay Ticketing Prototype</title>
    <style>
      :root { font-family: Segoe UI, Arial, sans-serif; color: #1a2433; }
      body { margin: 0; background: #f6f8fb; }
      .page { max-width: 900px; margin: 0 auto; padding: 24px; }
      .card { background: #fff; border: 1px solid #dbe3ef; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
      .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
      label { display: grid; gap: 6px; font-size: 14px; }
      input, select, button { padding: 10px; border-radius: 8px; border: 1px solid #c9d5e6; }
      button { cursor: pointer; background: #0b6bcb; color: #fff; border: 0; }
      .muted { color: #5c6f85; }
      .ok { color: #146c2e; }
      .err { color: #b42318; }
      @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
