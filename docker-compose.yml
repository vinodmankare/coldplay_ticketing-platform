services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: coldplay-api
    ports:
      - "8080:8000"
    volumes:
      - ./backend:/var/www/backend
    environment:
      - ALLOWED_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
      - CSRF_TOKEN=local-dev-csrf-token
      - RATE_LIMIT_WINDOW_SECONDS=60
      - RATE_LIMIT_MAX_PER_IP=25
      - RATE_LIMIT_GLOBAL_MAX=500
    command: sh -c "php scripts/init_db.php && php -S 0.0.0.0:8000 -t public"

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: coldplay-worker
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      - api
    command: sh -c "php scripts/init_db.php && php scripts/worker_loop.php"

  frontend:
    image: nginx:alpine
    container_name: coldplay-frontend
    ports:
      - "5173:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - api
